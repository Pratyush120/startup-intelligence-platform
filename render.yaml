services:
  - type: web
    name: startup-intelligence-platform-1
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://startup-intelligence-platform-1.onrender.com", "https://sdip-frontend.vercel.app", "http://localhost:3000"]'
      - key: GEMINI_API_KEY
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
