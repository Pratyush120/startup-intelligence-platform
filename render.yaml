services:
  - type: web
    name: sdip-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONPATH
        value: "."
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
